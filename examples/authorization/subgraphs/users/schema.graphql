# Unfortunately async-graphql doesn't allow us to add schema directive as far as I know. We expect an absolute path to day or an URL.
extend schema @link(url: "file:///var/lib/grafbase/extensions/authorization/build", import: ["@jwtScope", "@sensible"])

type User @jwtScope(scope: "user") @sensible(response: "id") {
  id: Int!
  name: String!
}

type Query {
  user(id: Int!): User @sensible(arguments: "id")
  users: [User]!
}
