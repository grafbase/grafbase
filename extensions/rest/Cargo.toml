[package]
name = "rest"
version = "0.1.3"
edition = "2021"
license = "MPL-2"
homepage = "https://grafbase.com"
keywords = ["graphql"]
repository = "https://github.com/grafbase/grafbase"

[dependencies]
futures-util = "0.3.31"
grafbase-sdk = { path = "../../crates/grafbase-sdk" }
http = "1"
jaq-core = "2.1.0"
jaq-json = { version = "1.1.0", features = ["serde_json"] }
jaq-parse = "1.0.3"
jaq-std = "2.1.0"
rustls = { version = "0.23.23", default-features = false }
rustls-rustcrypto = "0.0.2-alpha"
serde = "1"
serde_json = "1"
webpki-roots = "0.26.8"

[dependencies.reqwest]
git = "https://github.com/pimeys/reqwest"
branch = "wasip2"
default-features = false
features = ["rustls-tls-webpki-roots-no-provider", "json"]

[patch.crates-io]
tokio = { git = "https://github.com/pimeys/tokio", branch = "wasip2" }
socket2 = { git = "https://github.com/pimeys/socket2", branch = "wasip2" }
hyper-util = { git = "https://github.com/pimeys/hyper-util", branch = "wasip2" }

[lib]
crate-type = ["cdylib"]

[profile.release]
opt-level = "z"
strip = true
lto = true
codegen-units = 1

[dev-dependencies]
grafbase-sdk = { path = "../../crates/grafbase-sdk", features = ["test-utils"] }
indoc = "2.0.5"
insta = { version = "1.42.1", features = ["json"] }
serde_json = "1"
tokio = { version = "1.43.0", features = [
    "rt-multi-thread",
    "macros",
    "test-util",
] }
wiremock = "0.6.2"
