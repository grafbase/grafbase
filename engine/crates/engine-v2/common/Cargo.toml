[package]
authors = ["Grafbase"]
description = "Gateway request"
edition = "2021"
homepage = "https://grafbase.com"
keywords = ["graphql", "engine", "grafbase"]
license = "MPL-2.0"
name = "engine-v2-common"
repository = "https://github.com/grafbase/grafbase"
version = "0.1.0"

[lints]
workspace = true

[dependencies]
async-runtime.workspace = true
async-sse = "5"
base64.workspace = true
bytes.workspace = true
common-types.workspace = true
futures-util.workspace = true
headers.workspace = true
http.workspace = true
id-newtypes = { path = "../id-newtypes", package = "engine-v2-id-newtypes" }
itertools.workspace = true
log.workspace = true
mediatype = "0.19"
mime = "0.3"
multipart-stream = "0.1"
runtime.workspace = true
serde.workspace = true
serde_json.workspace = true
serde_urlencoded = "0.7"
serde_with = { workspace = true, features = ["hex"] }
sha2.workspace = true
tracing.workspace = true

axum = { workspace = true, optional = true }

[dev-dependencies]
insta.workspace = true


[build-dependencies]
built = { version = "0.7", features = ["git2"] }
